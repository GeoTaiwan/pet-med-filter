<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>犬貓驅蟲藥快速篩選系統</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .app-container { max-width: 650px; margin: auto; }
        .card { border-radius: 12px; border: none; }
        .result-card { transition: transform 0.2s, box-shadow 0.2s; border-left: 5px solid #0d6efd; }
        .result-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1) !important; }
        .badge-method { background-color: #6f42c1; }
    </style>
</head>
<body>

<div class="container py-4 app-container">
    
    <h2 class="text-center mb-4 text-primary fw-bold">
        <i class="bi bi-shield-fill-plus"></i> 犬貓用藥篩選器
    </h2>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-6">
                    <label class="form-label fw-bold text-secondary small"><i class="bi bi-search"></i> 物種</label>
                    <select class="form-select form-select-lg" id="species">
                        <option value="dog">🐶 狗狗</option>
                        <option value="cat">🐱 貓咪</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label fw-bold text-secondary small"><i class="bi bi-speedometer2"></i> 體重</label>
                    <div class="input-group input-group-lg">
                        <input type="number" class="form-control" id="weight" step="0.1" value="3.0">
                        <span class="input-group-text bg-white">kg</span>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label fw-bold text-secondary small"><i class="bi bi-calendar-event"></i> 年齡 (週數)</label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="ageWeeks" value="8">
                        <span class="input-group-text bg-white">週大</span>
                    </div>
                    <div class="form-text">註：8週約等於56天</div>
                </div>

                <hr class="my-3">

                <div class="col-12 mt-2">
    <div class="accordion shadow-sm" id="filterAccordion">
        
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed fw-bold text-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#collapseMethod">
                    <i class="bi bi-capsule me-2"></i> 投藥方式限制
                </button>
            </h2>
            <div id="collapseMethod" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                <div class="accordion-body">
                    <div class="row g-2">
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="口服" id="chk_oral"><label class="form-check-label" for="chk_oral">口服</label></div></div>
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="滴劑" id="chk_drop"><label class="form-check-label" for="chk_drop">滴劑</label></div></div>
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="噴劑" id="chk_spray"><label class="form-check-label" for="chk_spray">噴劑</label></div></div>
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="針劑" id="chk_inject"><label class="form-check-label" for="chk_inject">針劑</label></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed fw-bold text-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#collapseEcto">
                    <i class="bi bi-bug me-2"></i> 體外寄生蟲防護
                </button>
            </h2>
            <div id="collapseEcto" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                <div class="accordion-body">
                    <div class="row g-2">
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="跳蚤" id="chk_flea"><label class="form-check-label" for="chk_flea">跳蚤</label></div></div>
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="壁蝨" id="chk_tick"><label class="form-check-label" for="chk_tick">壁蝨</label></div></div>
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="驅蚊/沙蠅" id="chk_mosquito"><label class="form-check-label" for="chk_mosquito">驅蚊/沙蠅</label></div></div>
                        <div class="col-12"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="皮膚蟎蟲（毛囊/疥癬/耳疥）" id="chk_mite_all"><label class="form-check-label" for="chk_mite_all">皮膚蟎蟲 (綜合)</label></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed fw-bold text-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#collapseEndo">
                    <i class="bi bi-heart-pulse me-2"></i> 體內寄生蟲防護
                </button>
            </h2>
            <div id="collapseEndo" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                <div class="accordion-body">
                    <div class="row g-2">
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="心絲蟲" id="chk_heartworm"><label class="form-check-label" for="chk_heartworm">心絲蟲</label></div></div>
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="絛蟲" id="chk_tapeworm"><label class="form-check-label" for="chk_tapeworm">絛蟲</label></div></div>
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="腸道線蟲（蛔）" id="chk_roundworm"><label class="form-check-label" for="chk_roundworm">腸道線蟲(蛔)</label></div></div>
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="腸道線蟲（鉤）" id="chk_hookworm"><label class="form-check-label" for="chk_hookworm">腸道線蟲(鉤)</label></div></div>
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="腸道線蟲（鞭）" id="chk_whipworm"><label class="form-check-label" for="chk_whipworm">腸道線蟲(鞭)</label></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed fw-bold text-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSafety">
                    <i class="bi bi-shield-check me-2"></i> 特殊安全需求
                </button>
            </h2>
            <div id="collapseSafety" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                <div class="accordion-body">
                    <div class="row g-2">
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="懷孕" id="chk_pregnant"><label class="form-check-label" for="chk_pregnant">懷孕期可用</label></div></div>
                        <div class="col-6"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="配種/哺乳" id="chk_nursing"><label class="form-check-label" for="chk_nursing">哺乳期可用</label></div></div>
                        <div class="col-12"><div class="form-check form-switch"><input class="form-check-input dynamic-filter" type="checkbox" data-col="仿單同意-牧羊犬" id="chk_collie"><label class="form-check-label" for="chk_collie">牧羊犬安全 (仿單同意)</label></div></div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

            </div>
        </div>
    </div>

    <div class="mb-3 d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-bold text-secondary">篩選結果</h5>
        <span class="badge bg-secondary rounded-pill" id="resultCount">共 0 筆</span>
    </div>

    <div id="results" class="row g-3">
        </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ==========================================
// 1. Model (資料層)：處理 CSV 與過濾邏輯
// ==========================================
class DrugModel {
    constructor() {
        this.database = [];
        // 將你剛剛在 Google Sheets 取得的 CSV 發佈網址貼在這裡
        this.csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQNElk0z4WhmhFULXtblpENwIukplYoKwrXH9_shMuaVT85vMxHVkKhl-H4HPGiBYP30mQPTtWBvO56/pub?gid=0&single=true&output=csv'; 
    }

    // 將 init 改為非同步函數 (async)
    async init() {
        try {
            // 向 Google Sheets 發送網路請求取得最新資料
            const response = await fetch(this.csvUrl);
            const csvText = await response.text();
            
            // 將抓下來的純文字交給 PapaParse 解析
            const parsed = Papa.parse(csvText.trim(), {
                header: true,
                skipEmptyLines: true
            });
            this.database = parsed.data;
        } catch (error) {
            console.error("讀取 Google Sheets 失敗：", error);
            alert("無法載入最新藥品資料，請檢查網路連線或網址設定。");
        }
    }

    getFilteredDrugs(criteria) {
    return this.database.filter(row => {
        // 1. 檢查基本條件
        const matchSpecies = criteria.species === 'dog' ? (row['犬'] === 'TRUE') : (row['貓'] === 'TRUE');
        const minWeight = parseFloat(row['商品最小體重（kg)']) || 0;
        const minAgeDays = parseFloat(row['最小年齡（天）']) || 0;
        const matchWeight = criteria.weight >= minWeight;
        const matchAge = criteria.ageDays >= minAgeDays;

        if (!matchSpecies || !matchWeight || !matchAge) return false;

        // 2. 檢查動態布林值條件 (這段最神奇，跑迴圈自動比對)
        // 只要使用者有勾選的要求 (存在 requiredBooleans 陣列裡)，該藥品在 CSV 的對應欄位就必須是 'TRUE'
        for (let colName of criteria.requiredBooleans) {
            // 如果該欄位在資料表裡不是 TRUE，就直接淘汰這款藥品
            if (row[colName] !== 'TRUE') {
                return false;
            }
        }

        // 所有嚴格檢查都過關，保留這款藥！
        return true; 
    });
}
}

// ==========================================
// 2. View (畫面層)：處理 DOM 操作
// ==========================================
class AppView {
    constructor() {
        this.inputs = {
            species: document.getElementById('species'),
            weight: document.getElementById('weight'),
            ageWeeks: document.getElementById('ageWeeks'),
            flea: document.getElementById('chk_flea'),
            heartworm: document.getElementById('chk_heartworm'),
            nematode: document.getElementById('chk_nematode'),
            mite: document.getElementById('chk_mite')
        };
        this.resultsContainer = document.getElementById('results');
        this.resultCount = document.getElementById('resultCount');
    }

    // 取得所有輸入值
    getFilterCriteria() {
    // 1. 抓取基本條件
    const criteria = {
        species: document.getElementById('species').value,
        weight: parseFloat(document.getElementById('weight').value) || 0,
        ageDays: (parseFloat(document.getElementById('ageWeeks').value) || 0) * 7,
        requiredBooleans: [] // 用來存放所有「被打開」的選項對應的 CSV 欄位名稱
    };

    // 2. 自動抓取所有被勾選的動態過濾器 (重點在這裡！)
    const dynamicSwitches = document.querySelectorAll('.dynamic-filter:checked');
    dynamicSwitches.forEach(sw => {
        criteria.requiredBooleans.push(sw.getAttribute('data-col'));
    });

    return criteria;
}

    // 監聽所有輸入欄位的「改變」事件 (不需按鈕，即時篩選)
    bindFiltersChange(handler) {
    // 綁定基本條件
    ['species', 'weight', 'ageWeeks'].forEach(id => {
        document.getElementById(id).addEventListener('change', handler);
        document.getElementById(id).addEventListener('input', handler);
    });

    // 綁定所有動態開關
    document.querySelectorAll('.dynamic-filter').forEach(input => {
        input.addEventListener('change', handler);
    });
}

    renderResults(data) {
        this.resultsContainer.innerHTML = ''; 
        this.resultCount.textContent = `共 ${data.length} 筆`;

        if (data.length === 0) {
            this.resultsContainer.innerHTML = `
                <div class="col-12 text-center py-5 text-muted">
                    <i class="bi bi-search fs-1 d-block mb-3 text-secondary opacity-50"></i>
                    <p class="fs-5">找不到完全符合的藥品條件</p>
                </div>`;
            return;
        }

        let htmlString = '';
        data.forEach(drug => {
            // 判斷劑型
            let methodText = [];
            if(drug['口服'] === 'TRUE') methodText.push('口服');
            if(drug['滴劑'] === 'TRUE') methodText.push('滴劑');
            if(drug['噴劑'] === 'TRUE') methodText.push('噴劑');
            if(drug['針劑'] === 'TRUE') methodText.push('針劑');

            // 組合保護範圍標籤
            let tagsHtml = '';
            if (drug['心絲蟲'] === 'TRUE') tagsHtml += `<span class="badge text-bg-danger me-1 mb-1"><i class="bi bi-heart-fill"></i> 心絲蟲</span>`;
            if (drug['跳蚤'] === 'TRUE' || drug['壁蝨'] === 'TRUE') tagsHtml += `<span class="badge text-bg-success me-1 mb-1"><i class="bi bi-bug-fill"></i> 蚤/蝨</span>`;
            if (drug['腸道線蟲（蛔）'] === 'TRUE' || drug['絛蟲'] === 'TRUE') tagsHtml += `<span class="badge text-bg-warning text-dark me-1 mb-1">腸道蟲</span>`;
            if (drug['皮膚蟎蟲（毛囊/疥癬/耳疥）'] === 'TRUE') tagsHtml += `<span class="badge text-bg-info text-dark me-1 mb-1">蟎蟲</span>`;

            // 判斷是否有重要警告 (合併內容3與懷孕警告)
            let warningText = drug['內容3(資訊補充)'];
            if(drug['懷孕'] === 'FALSE') warningText = (warningText ? warningText + " / " : "") + "不建議於懷孕期使用";

            const warningHtml = warningText ? `
                <div class="alert alert-warning py-2 px-3 mb-0 mt-3 small" role="alert">
                    <i class="bi bi-exclamation-triangle-fill text-warning me-1"></i> ${warningText}
                </div>` : '';

            htmlString += `
                <div class="col-12 col-md-6">
                    <div class="card shadow-sm result-card h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h4 class="card-title fw-bold text-dark mb-0">${drug['商品']}</h4>
                                <span class="badge badge-method fs-6">${methodText.join('/')}</span>
                            </div>
                            
                            <p class="text-muted small mb-2 d-flex gap-3">
                                <span><i class="bi bi-clock-history"></i> 效期: ${drug['效期時長']}</span>
                                <span><i class="bi bi-droplet"></i> 勿碰水: ${drug['勿碰水時間(hr)'] || 0}hr</span>
                            </p>
                            
                            <div class="mb-1">${tagsHtml}</div>
                            ${warningHtml}
                        </div>
                    </div>
                </div>
            `;
        });
        
        this.resultsContainer.innerHTML = htmlString;
    }
}

// ==========================================
// 3. Controller (控制層)
// ==========================================
class AppController {
    constructor(model, view) {
        this.model = model;
        this.view = view;

        // 啟動應用程式
        this.startApp();
    }

    async startApp() {
        // 在等待 Google Sheets 回傳資料的期間，先在畫面上顯示載入中
        this.view.resultsContainer.innerHTML = '<div class="col-12 text-center py-5 text-muted"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">正在從雲端載入最新藥品資料...</p></div>';

        // 加上 await，強制程式在這裡「等」資料完全抓好並解析完畢
        await this.model.init(); 

        // 資料確認準備好後，才開始綁定輸入框的監聽事件，並渲染第一次的畫面
        this.view.bindFiltersChange(() => this.handleSearch());
        this.handleSearch(); 
    }

    handleSearch() {
        const criteria = this.view.getFilterCriteria();
        const filteredData = this.model.getFilteredDrugs(criteria);
        this.view.renderResults(filteredData);
    }
}

// 啟動系統
document.addEventListener('DOMContentLoaded', () => {
    const app = new AppController(new DrugModel(), new AppView());
});
</script>

</body>
</html>
